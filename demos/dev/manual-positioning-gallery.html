<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Manual node positioning examples</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0 auto;
        padding: 2rem;
        max-width: 1200px;
        background: radial-gradient(circle at top left, rgba(80, 120, 200, 0.08), transparent 60%);
      }
      h1 {
        margin-bottom: 2rem;
        text-align: center;
        letter-spacing: 0.05em;
      }
      .example {
        margin-bottom: 3rem;
        border-bottom: 1px solid rgba(100, 100, 100, 0.3);
        padding-bottom: 2.5rem;
      }
      .pair {
        display: grid;
        gap: 1.5rem;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      }
      figure {
        margin: 0;
        padding: 1rem;
        border-radius: 0.75rem;
        border: 1px solid rgba(120, 120, 120, 0.25);
        background: rgba(255, 255, 255, 0.55);
        box-shadow: 0 18px 40px rgba(15, 30, 60, 0.08);
        backdrop-filter: blur(12px);
      }
      figcaption {
        font-weight: 600;
        text-align: center;
        margin-bottom: 0.75rem;
      }
      .description {
        margin-bottom: 1rem;
        color: rgba(30, 30, 30, 0.7);
      }
      .status {
        position: fixed;
        inset: auto 1.5rem 1.5rem auto;
        background: rgba(20, 120, 80, 0.9);
        color: white;
        padding: 0.75rem 1.25rem;
        border-radius: 999px;
        font-size: 0.9rem;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
        display: none;
      }
      svg {
        width: 100%;
        height: auto;
      }
      pre {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="status" id="status">Saving SVG assets…</div>
    <h1>Manual node positioning showcase</h1>
    <div id="examples"></div>
    <script id="example-data" type="application/json">[{"id":"assembly-line","title":"Assembly line overview","description":"Manual coordinates stagger the intake, build, and QA steps to mimic the real conveyor belt spacing.","before":"flowchart LR\n  Intake --> Build --> QA --> Ship","after":"flowchart LR\n  Intake@{ position: \"0 40\" }\n  Build@{ position: [140, 0] }\n  QA@{ position: [280, 60] }\n  Ship@{ position: \"420 20\" }\n  Intake --> Build --> QA --> Ship"},{"id":"decision-diamond","title":"Decision diamond","description":"The decision and outcomes form a diamond layout by nudging the approve/deny nodes around the decision.","before":"flowchart TB\n  Start --> Decision\n  Decision -->|Approve| Approve\n  Decision -->|Deny| Deny\n  Approve --> Archive\n  Deny --> Rework","after":"flowchart TB\n  Start@{ position: \"200 0\" }\n  Decision@{ position: [200, 80] }\n  Approve@{ position: [320, 160] }\n  Deny@{ position: [80, 160] }\n  Archive@{ position: [320, 240] }\n  Rework@{ position: [80, 240] }\n  Start --> Decision\n  Decision -->|Approve| Approve\n  Decision -->|Deny| Deny\n  Approve --> Archive\n  Deny --> Rework"},{"id":"swimlane-hand-off","title":"Swimlane hand-off","description":"Nodes are aligned into product, design, and engineering columns by setting X coordinates while keeping the flow intact.","before":"flowchart TB\n  Concept --> Wireframe --> Prototype --> Launch","after":"flowchart TB\n  Concept@{ position: \"0, 0\" }\n  Wireframe@{ position: \"200, 0\" }\n  Prototype@{ position: \"400, 0\" }\n  Launch@{ position: \"600, 0\" }\n  Research@{ position: \"0, 120\" }\n  Review@{ position: \"200, 120\" }\n  Test@{ position: \"400, 120\" }\n  Measure@{ position: \"600, 120\" }\n  Concept --> Wireframe --> Prototype --> Launch\n  Concept --> Research\n  Wireframe --> Review\n  Prototype --> Test\n  Launch --> Measure"},{"id":"support-escalation","title":"Support escalation map","description":"Manual positions create a left-to-right escalation ladder with callbacks placed underneath their owners.","before":"flowchart LR\n  Tier1 --> Tier2 --> Tier3\n  Tier1 --> KB\n  Tier2 --> Vendor\n  Tier3 --> Report","after":"flowchart LR\n  Tier1@{ position: \"0 0\" }\n  Tier2@{ position: [180, 0] }\n  Tier3@{ position: [360, 0] }\n  KB@{ position: \"0 120\" }\n  Vendor@{ position: [180, 120] }\n  Report@{ position: [360, 120] }\n  Tier1 --> Tier2 --> Tier3\n  Tier1 --> KB\n  Tier2 --> Vendor\n  Tier3 --> Report"},{"id":"release-train","title":"Release train timeline","description":"A quarterly release train is plotted across a calendar-like grid so stakeholders can follow dates at a glance.","before":"flowchart LR\n  Plan --> Build --> Integrate --> Release\n  Plan --> Retro\n  Build --> Demo\n  Integrate --> Hardening\n  Release --> Celebrate","after":"flowchart LR\n  Plan@{ position: \"0 0\" }\n  Build@{ position: \"160 0\" }\n  Integrate@{ position: \"320 0\" }\n  Release@{ position: \"480 0\" }\n  Retro@{ position: \"0 120\" }\n  Demo@{ position: \"160 120\" }\n  Hardening@{ position: \"320 120\" }\n  Celebrate@{ position: \"480 120\" }\n  Plan --> Build --> Integrate --> Release\n  Plan --> Retro\n  Build --> Demo\n  Integrate --> Hardening\n  Release --> Celebrate"},{"id":"subgraph-layout","title":"Data center rooms","description":"Two rooms stay grouped while rack nodes are arranged manually inside each subgraph.","before":"flowchart LR\n  subgraph RoomA\n    A1 --> A2 --> A3\n  end\n  subgraph RoomB\n    B1 --> B2 --> B3\n  end\n  A3 --> B1","after":"flowchart LR\n  subgraph RoomA\n    direction LR\n    A1@{ position: \"0 40\" }\n    A2@{ position: [120, 40] }\n    A3@{ position: [240, 40] }\n    A1 --> A2 --> A3\n  end\n  subgraph RoomB\n    direction LR\n    B1@{ position: [420, 40] }\n    B2@{ position: [540, 40] }\n    B3@{ position: [660, 40] }\n    B1 --> B2 --> B3\n  end\n  A3 --> B1"},{"id":"feedback-loop","title":"Feedback loop highlight","description":"Feedback and iteration nodes wrap around the main cycle by curving them beneath the default layout.","before":"flowchart TD\n  Idea --> Build --> Launch --> Monitor --> Improve --> Idea","after":"flowchart TD\n  Idea@{ position: \"200 0\" }\n  Build@{ position: \"200 120\" }\n  Launch@{ position: \"200 240\" }\n  Monitor@{ position: \"200 360\" }\n  Improve@{ position: [60, 360] }\n  Idea --> Build --> Launch --> Monitor\n  Monitor --> Improve\n  Improve --> Idea"},{"id":"service-blueprint","title":"Service blueprint snapshot","description":"Front stage, back office, and system swimlanes become a tidy matrix driven solely by manual coordinates.","before":"flowchart TB\n  Customer --> Agent --> System\n  Customer --> SelfService\n  Agent --> Knowledge\n  System --> Logs","after":"flowchart TB\n  Customer@{ position: \"0 0\" }\n  Agent@{ position: [240, 0] }\n  System@{ position: [480, 0] }\n  SelfService@{ position: \"0 160\" }\n  Knowledge@{ position: [240, 160] }\n  Logs@{ position: [480, 160] }\n  Customer --> Agent --> System\n  Customer --> SelfService\n  Agent --> Knowledge\n  System --> Logs"}]</script>
    <script type="module">
      import mermaid from '/mermaid.esm.mjs';
      import layouts from '/mermaid-layout-elk.esm.mjs';

      mermaid.registerLayoutLoaders(layouts);

      const statusEl = document.getElementById('status');
      const examples = JSON.parse(document.getElementById('example-data').textContent);
      const container = document.getElementById('examples');

      const makeDiagramBlock = (caption, id) => {
        const figure = document.createElement('figure');
        const figcaption = document.createElement('figcaption');
        figcaption.textContent = caption;
        const wrapper = document.createElement('div');
        wrapper.dataset.diagramId = id;
        figure.append(figcaption, wrapper);
        return { figure, wrapper };
      };

      for (const example of examples) {
        const section = document.createElement('section');
        section.className = 'example';

        const title = document.createElement('h2');
        title.textContent = example.title;
        const description = document.createElement('p');
        description.className = 'description';
        description.textContent = example.description;

        const pair = document.createElement('div');
        pair.className = 'pair';

        const beforeId = example.id + '-before';
        const afterId = example.id + '-after';

        const before = makeDiagramBlock('Automatic layout', beforeId);
        const after = makeDiagramBlock('Manual coordinates', afterId);

        pair.append(before.figure, after.figure);
        section.append(title, description, pair);
        container.append(section);
      }

      await mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'loose',
        flowchart: { htmlLabels: false },
        theme: 'neutral'
      });

      const outputs = [];
      for (const example of examples) {
        const beforeId = example.id + '-before';
        const afterId = example.id + '-after';

        const beforeSvg = await mermaid.render(beforeId, example.before);
        const afterSvg = await mermaid.render(afterId, example.after);

        const beforeTarget = document.querySelector('[data-diagram-id="' + beforeId + '"]');
        const afterTarget = document.querySelector('[data-diagram-id="' + afterId + '"]');
        beforeTarget.innerHTML = beforeSvg.svg;
        afterTarget.innerHTML = afterSvg.svg;

        outputs.push({ id: example.id, beforeSvg: beforeSvg.svg, afterSvg: afterSvg.svg });
      }

      async function postSVGs() {
        statusEl.style.display = 'block';
        try {
          await fetch('/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ examples: outputs })
          });
      statusEl.textContent = 'SVG assets saved ✓';
          statusEl.style.background = 'rgba(30, 150, 90, 0.92)';
        } catch (error) {
          statusEl.textContent = 'Failed to save SVG assets';
          statusEl.style.background = 'rgba(170, 40, 40, 0.92)';
          console.error(error);
        }
        setTimeout(() => {
          statusEl.style.opacity = '0';
          setTimeout(() => {
            statusEl.style.display = 'none';
            statusEl.style.opacity = '';
          }, 600);
        }, 2500);
      }

      postSVGs();
    </script>
  </body>
</html>
